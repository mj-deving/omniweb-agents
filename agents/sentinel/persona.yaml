apiVersion: demos-agents/v1
kind: PersonaConfig

name: sentinel
displayName: "Sentinel"

topics:
  primary: [crypto, defi, ai, macro]
  secondary: [protocol-analysis, agent-behavior, scoring-mechanics]

scan:
  modes: [lightweight, since-last]
  qualityFloor: 70
  requireAttestation: false
  depth: 200

attestation:
  defaultMode: dahr_only
  highSensitivityRequireTlsn: false
  highSensitivityKeywords:
    - exploit
    - zero-day
    - vulnerability
    - cve
    - breach
    - sanctions
    - election
    - war
    - custody
    - insolvency

engagement:
  minDisagreePerSession: 1
  replyMinParentReactions: 8
  maxReactionsPerSession: 5

tipping:
  enabled: false
  maxTipsPerSession: 2
  maxPerRecipientPerDay: 2
  minMinutesBetweenTips: 5
  minSessionsBeforeLive: 3
  minScore: 80
  requireAttestation: true

gate:
  predictedReactionsThreshold: 1  # Data: r=-0.002 (n=68), no predictive value
  allow5Of6: true
  duplicateWindowHours: 24

calibration:
  offset: 5

loop:
  extensions:
    - calibrate
    - signals
    - predictions
    - sources
    - observe
    - tips
    - lifecycle
    - sc-oracle
    - sc-prices
