schemaVersion: 1

provider:
  name: hn-algolia
  displayName: Hacker News Algolia
  matches:
    providers: [hn-algolia]
    hosts: [hn.algolia.com]
  domains: [tech, startup, ai, programming]
  rateLimit:
    bucket: hn-algolia
    maxPerDay: 10000
  auth:
    mode: none
  defaults:
    responseFormat: json
    parseFailureMode: empty-entries
    normalizeJson: true

operations:
  search:
    when:
      sourceAdapterOperation: [search]
      default: true
    request:
      method: GET
      urlTemplate: "https://hn.algolia.com/api/v1/search"
      query:
        query: "{query}"
        hitsPerPage: "{hitsPerPage}"
      estimatedSizeKb:
        TLSN: 8
        DAHR: 14
      matchHints:
        - "{query}"
        - "{tokens[0]}"
    variables:
      query:
        sources: [vars.query, topic]
        required: true
      hitsPerPage:
        sources:
          - literal: "5"
        default: "5"
    compatibility:
      responseFormats: [json]
      tlsn:
        allowed: true
        requireHttps: true
        maxResponseKb: 16
        rewriteQuery:
          hitsPerPage:
            default: 2
            max: 2
      dahr:
        allowed: true
        requireNormalizedJson: true
    parse:
      format: json
      items:
        mode: json-path
        jsonPath: "$.hits[*]"
      fields:
        id:
          jsonPath: "$.objectID"
          required: true
        title:
          jsonPath: "$.title"
        bodyText:
          template: "{story_text|title|(no content)}"
        canonicalUrl:
          jsonPath: "$.url"
        publishedAt:
          jsonPath: "$.created_at"
        topics:
          jsonPath: "$._tags[*]"
          default: []
        metrics:
          points:
            jsonPath: "$.points"
            default: 0
          num_comments:
            jsonPath: "$.num_comments"
            default: 0
          author:
            jsonPath: "$.author"
        raw:
          mode: item

