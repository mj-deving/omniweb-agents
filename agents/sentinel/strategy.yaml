# Sentinel Strategy — V3 Decision Engine
apiVersion: strategy/v3

rules:
  - name: reply_to_mentions
    type: REPLY
    priority: 100
    conditions:
      - "New unreplied mentions from trusted authors"
      - "Author postCount >= MIN_TRUST_POSTS"
      - "Not a bait pattern"
    enabled: true

  - name: engage_verified
    type: ENGAGE
    priority: 65
    conditions:
      - "Post has verified attestation"
      - "Attestation data matches claims"
    enabled: true

  - name: reply_with_evidence
    type: REPLY
    priority: 80
    conditions:
      - "Active discussion with matching evidence"
      - "Evidence freshness < 1h"
    enabled: true

  - name: publish_to_gaps
    type: PUBLISH
    priority: 50
    conditions:
      - "Topic gap identified in colony"
      - "Fresh rich evidence available"
    enabled: true

  - name: tip_valuable
    type: TIP
    priority: 30
    conditions:
      - "Post performance above colony median"
    enabled: true

  # Phase 6: Enrichment-aware rules
  - name: engage_novel_agents
    type: ENGAGE
    priority: 55
    conditions:
      - "Leaderboard agent above global avg"
      - "Not recently interacted"
    enabled: true

  - name: publish_signal_aligned
    type: PUBLISH
    priority: 60
    conditions:
      - "Trending signal with consensus"
      - "Matching evidence available"
    enabled: true

  - name: publish_on_divergence
    type: PUBLISH
    priority: 70
    conditions:
      - "Oracle price divergence above threshold"
    enabled: true

  - name: publish_prediction
    type: PUBLISH
    priority: 45
    conditions:
      - "Active betting pool for configured asset"
      - "Pool has at least 3 bets"
      - "Price data available"
    enabled: true

  # Phase 8b: Reply to contradictory claims with evidence
  - name: disagree_contradiction
    type: REPLY
    priority: 70
    conditions:
      - "Contradiction detected in claim ledger"
      - "Agent has supporting evidence for one value"
      - "Target post is by a different author"
    enabled: true

rateLimits:
  postsPerDay: 14
  postsPerHour: 5
  reactionsPerSession: 8
  maxTipAmount: 10
  betsPerDay: 3

performance:
  engagement: 40
  discussion: 25
  replyBase: 10
  replyDeep: 10
  threadDepth: 5
  economic: 20
  tipBase: 10
  tipCap: 10
  tipMultiplier: 2
  controversy: 5
  ageHalfLife: 48

topicWeights:
  defi: 1.2
  crypto: 1.0
  macro: 1.1
  economics: 1.1
  markets: 1.0
  tech: 0.9
  geopolitics: 0.9
  science: 0.8
  forex: 0.8
  software: 0.7

enrichment:
  minSignalAgents: 2
  minConfidence: 40

# Phase 7: Dynamic priority adjustment based on leaderboard position
leaderboardAdjustment:
  enabled: true
  topBoostEngagement: 15
  topAdjustPublish: -5
  bottomBoostPublish: 15
  bottomAdjustEngagement: -5

# Legacy V1 8-phase strategy removed in Phase 3. See git history: 92870d2
