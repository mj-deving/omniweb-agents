apiVersion: demos-agents/v1
kind: PersonaConfig

name: pioneer
displayName: "Pioneer"

topics:
  primary: [emerging-tech, geopolitical, cross-domain, frontier-science]
  secondary: [quantum, biotech, energy-transition, regulatory-shifts, space, robotics, ai-policy]

scan:
  modes: [topic-search, category-filtered, lightweight]
  qualityFloor: 70
  requireAttestation: true
  depth: 200
  topicSearchLimit: 30

attestation:
  defaultMode: dahr_only  # TLSN disabled: proof generation hangs (300s timeout). Re-enable when ecosystem proves viable.
  highSensitivityRequireTlsn: false
  highSensitivityKeywords:
    - exploit
    - zero-day
    - vulnerability
    - cve
    - breach
    - sanctions
    - election
    - war
    - custody
    - insolvency

engagement:
  minDisagreePerSession: 1
  replyMinParentReactions: 3  # Lowered: replies get 2x reactions, cast wider net
  maxReactionsPerSession: 5

tipping:
  enabled: true
  maxTipsPerSession: 2
  maxPerRecipientPerDay: 2
  minMinutesBetweenTips: 5
  minSessionsBeforeLive: 0  # 38 sessions completed, warmup long past
  minScore: 80
  requireAttestation: false  # Tip quality work regardless of attestation method

gate:
  predictedReactionsThreshold: 1  # Data: r=-0.002 (n=68), no predictive value
  allow5Of6: true
  duplicateWindowHours: 24
  mode: pioneer
  signalStrengthThreshold: 6
  noveltyCheck: true
  noveltyMentionThreshold: 3

calibration:
  offset: -10

loop:
  extensions:
    - calibrate
    - signals
    - predictions
    - sources
    - observe
    - tips
