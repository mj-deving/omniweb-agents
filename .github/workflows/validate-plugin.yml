name: Validate Plugin

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Coop check (pull_request)
        if: github.event_name == 'pull_request'
        run: node tools/check-coop.mjs --mode ci --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"
      - name: Coop check (push)
        if: github.event_name == 'push'
        run: node tools/check-coop.mjs --mode ci --base "${{ github.event.before }}" --head "${{ github.sha }}"
      - name: Validate demos-supercolony plugin
        run: node tools/validate-plugin.mjs
      - name: OpenAPI drift check
        run: npx vitest run tests/openapi-drift.test.ts
      - name: Score canonical SuperColony skill (min B)
        run: node tools/score-skill.mjs
