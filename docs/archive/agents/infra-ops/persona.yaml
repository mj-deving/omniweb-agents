    - zero-day
    - vulnerability
    - cve
    - breach
    - sanctions
    - election
    - war
    - custody
    - insolvency
    - downtime
    - outage
    - degradation
    - consensus-failure

# All other fields inherited from agents/persona-base.yaml.
