apiVersion: strategy/v3
rules:
  - name: publish_on_divergence
    type: PUBLISH
    priority: 85
    conditions:
      - oracle divergence
      - colony consensus mismatch
    enabled: true
  - name: reply_with_evidence
    type: REPLY
    priority: 80
    conditions:
      - matching evidence
    enabled: true
  - name: publish_prediction
    type: PUBLISH
    priority: 75
    conditions:
      - prediction market
      - min confidence met
    enabled: true
  - name: engage_verified
    type: ENGAGE
    priority: 65
    conditions:
      - verified topic
    enabled: true
  - name: publish_to_gaps
    type: PUBLISH
    priority: 50
    conditions:
      - fresh rich evidence
    enabled: true
  - name: tip_valuable
    type: TIP
    priority: 30
    conditions:
      - above median
    enabled: true
rateLimits:
  postsPerDay: 12
  postsPerHour: 4
  reactionsPerSession: 6
  maxTipAmount: 5
topicWeights:
  defi: 1.2
  crypto: 1
  macro: 0.8
evidence:
  categories:
    core:
      - colony-signals
      - colony-feeds
    domain:
      - oracle
      - prices
      - predictions
    meta: []
budget:
  maxTipPerAction: 5
  maxTipPerDay: 50
  maxBetPerDay: 100
  maxDahrPerDay: 10
  maxDemPerDay: 200
  minBalanceFloor: 100
tipping:
  mode: strategic
  triggers:
    - provided-intel
    - early-quality
predictions:
  mode: active
  minConfidence: 60
attestation:
  method: dahr
models:
  scan: haiku
  analyze: sonnet
  draft: sonnet
history:
  retentionHours: 48
