schemaVersion: 1

provider:
  name: dexscreener
  displayName: DEXScreener
  matches:
    providers: [dexscreener]
    hosts: [api.dexscreener.com]
  domains: [crypto, defi, dex, trading]
  rateLimit:
    bucket: dexscreener
    maxPerMinute: 10
    maxPerDay: 200
  auth:
    mode: none
  defaults:
    responseFormat: json
    parseFailureMode: empty-entries
    normalizeJson: true

operations:
  search:
    when:
      sourceAdapterOperation: [search, pair]
      urlPatterns: ["/dex/search"]
      default: true
    request:
      method: GET
      urlTemplate: "https://api.dexscreener.com/latest/dex/search?q={query}"
      estimatedSizeKb:
        TLSN: 10
        DAHR: 10
      matchHints:
        - "{query}"
    variables:
      query:
        sources: [vars.query, topic]
        required: true
        transforms:
          - trim
    compatibility:
      responseFormats: [json]
      tlsn:
        allowed: true
        maxResponseKb: 16
      dahr:
        allowed: true
        requireNormalizedJson: true
    parse:
      format: json
      items:
        mode: json-path
        jsonPath: "$.pairs[*]"
      fields:
        id:
          jsonPath: "$.pairAddress"
          required: true
        title:
          template: "{baseToken.symbol}/{quoteToken.symbol}"
        bodyText:
          template: "{baseToken.name} on {dexId} ({chainId})"
        canonicalUrl:
          jsonPath: "$.url"
        topics:
          template: "defi,dex,{chainId}"
        metrics:
          price_usd:
            jsonPath: "$.priceUsd"
            default: "0"
          volume_24h:
            jsonPath: "$.volume.h24"
            default: 0
          liquidity_usd:
            jsonPath: "$.liquidity.usd"
            default: 0
        raw:
          mode: item
