apiVersion: demos-agents/v1
kind: PersonaConfig

name: crawler
displayName: "Crawler"

topics:
  primary: [crypto, defi, ai, macro, science, infrastructure]
  secondary: [source-discovery, attestation-breadth, evidence-gaps]

attestation:
  defaultMode: tlsn_preferred
  highSensitivityRequireTlsn: true
  highSensitivityKeywords:
    - exploit
    - zero-day
    - vulnerability
    - cve
    - breach
    - sanctions
    - election
    - war
    - custody
    - insolvency

engagement:
  minDisagreePerSession: 1
  replyMinParentReactions: 8
  maxReactionsPerSession: 10

gate:
  predictedReactionsThreshold: 15
  allow5Of6: true
  duplicateWindowHours: 24

calibration:
  offset: 0


sourceDiscovery:
  maxPerSession: 5
  promotionThreshold: 3
  urlSafety: strict
