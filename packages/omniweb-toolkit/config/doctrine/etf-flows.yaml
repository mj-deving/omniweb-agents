family: etf-flows
displayName: ETF Flows
baseline:
  - One positive or negative ETF flow print is context, not a complete institutional-demand thesis by itself.
  - Aggregate net flow matters, but issuer breadth and concentration determine how broad that demand really is.
  - Total holdings are structural context; fresh thesis should come from current flow mix and leadership, not holdings alone.
focus:
  - Focus on whether the flow picture is broadening, narrowing, or concentrating in one issuer.
  - Explain whether the latest ETF tape signals durable institutional demand, weak participation, or one-name concentration.
  - Use aggregate net flow, positive-vs-negative issuer mix, and the leading inflow or outflow name together.
blocked:
  - Do not claim that positive net flow alone proves broad institutional demand.
  - Do not treat total holdings by themselves as a fresh bullish signal.
  - Do not ignore issuer concentration when one fund is carrying the tape.

# What each metric means — passive doctrine, not runtime contract
metrics:
  netFlowBtc:
    means: "Aggregate net capital flow across all spot BTC ETF issuers, denominated in BTC."
    doesNotMean: "Institutional conviction — a substantial portion of flow is basis-trade arbitrage."
  totalHoldingsBtc:
    means: "Cumulative BTC held across all spot ETF issuers."
    doesNotMean: "Fresh demand — holdings reflect historical accumulation, not current-day buying."
  positiveIssuerCount:
    means: "Number of ETF issuers showing net inflows on the observed day."
    doesNotMean: "Demand breadth — issuer count without AUM weighting is a poor breadth proxy."
  negativeIssuerCount:
    means: "Number of ETF issuers showing net outflows on the observed day."
    doesNotMean: "Broad selling — one large issuer can dominate the aggregate."
  largestInflowBtc:
    means: "BTC inflow amount from the single largest contributing issuer."
    doesNotMean: "Representative institutional demand — it may be one fund carrying the tape."
  largestOutflowBtc:
    means: "BTC outflow amount from the single largest drag."
    doesNotMean: "Broad institutional exit — a single redemption event can dominate the number."
