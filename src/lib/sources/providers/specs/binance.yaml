schemaVersion: 1

provider:
  name: binance
  displayName: Binance
  matches:
    providers: [binance]
    hosts: [api.binance.com]
  domains: [crypto, trading, exchange]
  rateLimit:
    bucket: binance
    maxPerMinute: 1200
  auth:
    mode: none
  defaults:
    responseFormat: json
    parseFailureMode: empty-entries
    normalizeJson: true

operations:
  ticker-price:
    when:
      sourceAdapterOperation: [ticker-price]
      urlPatterns: ["/ticker/price"]
      default: true
    request:
      method: GET
      urlTemplate: "https://api.binance.com/api/v3/ticker/price"
      query:
        symbol: "{symbol}"
      estimatedSizeKb:
        TLSN: 1
        DAHR: 1
      matchHints:
        - "{symbol}"
        - "{asset}"
    variables:
      asset:
        sources: [vars.asset, vars.symbol, "tokens[0]"]
        default: "BTC"
      symbol:
        sources: [vars.asset, vars.symbol, "tokens[0]"]
        default: "BTC"
        transforms:
          - trim
          - lowercase
          - map:
              bitcoin: BTCUSDT
              btc: BTCUSDT
              ethereum: ETHUSDT
              eth: ETHUSDT
              solana: SOLUSDT
              sol: SOLUSDT
              bnb: BNBUSDT
              xrp: XRPUSDT
              cardano: ADAUSDT
              ada: ADAUSDT
              dogecoin: DOGEUSDT
              doge: DOGEUSDT
              polkadot: DOTUSDT
              dot: DOTUSDT
              avalanche: AVAXUSDT
              avax: AVAXUSDT
          - uppercase
    compatibility:
      responseFormats: [json]
      tlsn:
        allowed: true
        maxResponseKb: 16
      dahr:
        allowed: true
        requireNormalizedJson: true
    parse:
      format: json
      items:
        mode: single-object
      fields:
        id:
          jsonPath: "$.symbol"
          required: true
        title:
          template: "{symbol} Price"
        bodyText:
          template: "{symbol}: {price}"
        topics:
          template: "{symbol}"
        metrics:
          symbol:
            jsonPath: "$.symbol"
          price:
            jsonPath: "$.price"
        raw:
          mode: item

  ticker-24hr:
    when:
      sourceAdapterOperation: [ticker-24hr]
      urlPatterns: ["/ticker/24hr"]
    request:
      method: GET
      urlTemplate: "https://api.binance.com/api/v3/ticker/24hr"
      query:
        symbol: "{symbol}"
      estimatedSizeKb:
        TLSN: 2
        DAHR: 2
      matchHints:
        - "{symbol}"
        - "{asset}"
    variables:
      asset:
        sources: [vars.asset, vars.symbol, "tokens[0]"]
        default: "BTC"
      symbol:
        sources: [vars.asset, vars.symbol, "tokens[0]"]
        default: "BTC"
        transforms:
          - trim
          - lowercase
          - map:
              bitcoin: BTCUSDT
              btc: BTCUSDT
              ethereum: ETHUSDT
              eth: ETHUSDT
              solana: SOLUSDT
              sol: SOLUSDT
              bnb: BNBUSDT
              xrp: XRPUSDT
              cardano: ADAUSDT
              ada: ADAUSDT
              dogecoin: DOGEUSDT
              doge: DOGEUSDT
              polkadot: DOTUSDT
              dot: DOTUSDT
              avalanche: AVAXUSDT
              avax: AVAXUSDT
          - uppercase
    compatibility:
      responseFormats: [json]
      tlsn:
        allowed: true
        maxResponseKb: 16
      dahr:
        allowed: true
        requireNormalizedJson: true
    parse:
      format: json
      items:
        mode: single-object
      fields:
        id:
          jsonPath: "$.symbol"
          required: true
        title:
          template: "{symbol} 24h Stats"
        summary:
          template: "Price: {lastPrice}, Change: {priceChangePercent}%"
        bodyText:
          template: "{symbol} | Last: {lastPrice} | Change: {priceChange} ({priceChangePercent}%) | High: {highPrice} | Low: {lowPrice} | Volume: {volume}"
        topics:
          template: "{symbol}"
        metrics:
          lastPrice:
            jsonPath: "$.lastPrice"
          priceChange:
            jsonPath: "$.priceChange"
          priceChangePercent:
            jsonPath: "$.priceChangePercent"
          highPrice:
            jsonPath: "$.highPrice"
          lowPrice:
            jsonPath: "$.lowPrice"
          volume:
            jsonPath: "$.volume"
          quoteVolume:
            jsonPath: "$.quoteVolume"
          weightedAvgPrice:
            jsonPath: "$.weightedAvgPrice"
        raw:
          mode: item

  klines:
    when:
      sourceAdapterOperation: [klines]
      urlPatterns: ["/klines"]
    request:
      method: GET
      urlTemplate: "https://api.binance.com/api/v3/klines"
      query:
        symbol: "{symbol}"
        interval: "{interval}"
        limit: "{limit}"
      estimatedSizeKb:
        TLSN: 3
        DAHR: 12
      matchHints:
        - "{symbol}"
        - "{asset}"
        - "{interval}"
    variables:
      asset:
        sources: [vars.asset, vars.symbol, "tokens[0]"]
        default: "BTC"
      symbol:
        sources: [vars.asset, vars.symbol, "tokens[0]"]
        default: "BTC"
        transforms:
          - trim
          - lowercase
          - map:
              bitcoin: BTCUSDT
              btc: BTCUSDT
              ethereum: ETHUSDT
              eth: ETHUSDT
              solana: SOLUSDT
              sol: SOLUSDT
              bnb: BNBUSDT
              xrp: XRPUSDT
              cardano: ADAUSDT
              ada: ADAUSDT
              dogecoin: DOGEUSDT
              doge: DOGEUSDT
              polkadot: DOTUSDT
              dot: DOTUSDT
              avalanche: AVAXUSDT
              avax: AVAXUSDT
          - uppercase
      interval:
        sources: [vars.interval]
        default: "1h"
        enum: ["1m", "3m", "5m", "15m", "30m", "1h", "2h", "4h", "6h", "8h", "12h", "1d", "3d", "1w", "1M"]
      limit:
        sources:
          - literal: "100"
        default: "100"
    compatibility:
      responseFormats: [json]
      tlsn:
        allowed: true
        maxResponseKb: 16
        rewriteQuery:
          limit:
            default: 5
            max: 5
      dahr:
        allowed: true
        requireNormalizedJson: true
    parse:
      format: json
      # Response: [[openTime, open, high, low, close, volume, closeTime, quoteVol, trades, ...], ...]
      items:
        mode: array-tuples
        jsonPath: "$[*]"
        tupleFields: [openTime, open, high, low, close, volume, closeTime, quoteVolume, trades]
      fields:
        id:
          template: "kline-{openTime}"
          required: true
        title:
          template: "Candle {openTime}"
        bodyText:
          template: "O:{open} H:{high} L:{low} C:{close} V:{volume}"
        publishedAt:
          template: "{openTime}"
        topics:
          default: []
        metrics:
          open:
            template: "{open}"
          high:
            template: "{high}"
          low:
            template: "{low}"
          close:
            template: "{close}"
          volume:
            template: "{volume}"
          quoteVolume:
            template: "{quoteVolume}"
          trades:
            template: "{trades}"
            default: 0
        raw:
          mode: item
