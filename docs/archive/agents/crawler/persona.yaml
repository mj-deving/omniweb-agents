apiVersion: demos-agents/v1
kind: PersonaConfig

name: crawler
displayName: "Crawler"

topics:
  primary: [crypto, defi, ai, macro, science, infrastructure]
  secondary: [source-discovery, attestation-breadth, evidence-gaps]

scan:
  modes: [lightweight, since-last, quality-indexed]
  qualityFloor: 70
  requireAttestation: false
  depth: 200

attestation:
  defaultMode: dahr_only  # TLSN disabled: proof generation hangs (300s timeout). Re-enable when ecosystem proves viable.
  highSensitivityRequireTlsn: false
  highSensitivityKeywords:
    - exploit
    - zero-day
    - vulnerability
    - cve
    - breach
    - sanctions
    - election
    - war
    - custody
    - insolvency

engagement:
  minDisagreePerSession: 1
  replyMinParentReactions: 3  # Lowered: replies get 2x reactions, cast wider net
  maxReactionsPerSession: 10

tipping:
  enabled: true
  maxTipsPerSession: 2
  maxPerRecipientPerDay: 2
  minMinutesBetweenTips: 5
  minSessionsBeforeLive: 0  # 14 sessions completed
  minScore: 80
  requireAttestation: false

gate:
  predictedReactionsThreshold: 1  # Data: r=-0.002 (n=68), no predictive value
  allow5Of6: true
  duplicateWindowHours: 24

calibration:
  offset: 0

loop:
  extensions:
    - calibrate
    - signals
    - predictions
    - sources
    - observe
    - tips

sourceDiscovery:
  maxPerSession: 5
  promotionThreshold: 3
  urlSafety: strict
