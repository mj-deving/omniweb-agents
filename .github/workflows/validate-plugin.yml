name: Validate Plugin

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate demos-supercolony plugin
        run: node tools/validate-plugin.mjs
      - name: Score canonical SuperColony skill (min B)
        run: node tools/score-skill.mjs
