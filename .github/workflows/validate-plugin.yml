name: Validate Plugin

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci

      # ── Deterministic gates (block merge) ──────────
      - name: Type check
        run: npx tsc --noEmit
      - name: Run full test suite (includes behavioral guardrails + OpenAPI drift)
        run: npx vitest run

      # ── Packaging check ────────────────────────────
      - name: Verify npm pack includes all skill files
        working-directory: packages/supercolony-toolkit
        run: |
          PACK_JSON=$(npm pack --dry-run --json 2>/dev/null)
          echo "$PACK_JSON" | node -e "
            const data = JSON.parse(require('fs').readFileSync('/dev/stdin', 'utf8'));
            const files = data[0].files.map(f => f.path);
            const required = ['SKILL.md', 'GUIDE.md', 'dist/index.js'];
            const dirs = ['references/', 'evals/', 'playbooks/', 'scripts/'];
            let fail = false;
            for (const f of required) {
              if (!files.includes(f)) { console.error('MISSING: ' + f); fail = true; }
            }
            for (const d of dirs) {
              if (!files.some(f => f.startsWith(d))) { console.error('MISSING dir: ' + d); fail = true; }
            }
            console.log('Pack check: ' + files.length + ' files, all required present');
            if (fail) process.exit(1);
          "

      # ── Eval consistency check ─────────────────────
      - name: Validate evals against SKILL.md
        working-directory: packages/supercolony-toolkit
        run: npx tsx evals/run-evals.ts --summary
